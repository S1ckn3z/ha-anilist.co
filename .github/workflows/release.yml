name: CI & Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

      - name: Run HACS validation
        uses: hacs/action@main
        with:
          category: integration
          ignore: brands

  frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

      - name: Verify bundle is up to date
        run: git diff --exit-code -- custom_components/anilist/www/anilist-card.js www/anilist-card/anilist-card.js

  tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio aiohttp voluptuous

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  check-release:
    name: Check for release
    needs: [validate, frontend, tests]
    # Only consider releasing on push to main or tag, not PRs
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine release
        id: check
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/anilist/manifest.json'))['version'])")
          TAG="v$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_VERSION="${{ github.ref_name }}"
            TAG_VERSION="${TAG_VERSION#v}"
            if [[ "$TAG_VERSION" != "$VERSION" ]]; then
              echo "::error::Tag version ($TAG_VERSION) does not match manifest version ($VERSION)"
              exit 1
            fi
            echo "Manual tag push: releasing $TAG"
            echo "should_release=true" >> $GITHUB_OUTPUT
          elif git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::notice::Tag $TAG already exists — no release needed"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "::notice::New version $VERSION detected — will release $TAG"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  release:
    name: Create GitHub Release
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Create tag if missing
        run: |
          TAG="${{ needs.check-release.outputs.tag }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "::notice::Created and pushed tag $TAG"
          fi

      - name: Create release archive
        run: |
          cd custom_components/anilist
          zip -r ../../anilist.zip . -x "__pycache__/*" "*.pyc"
          cd ../..

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          # Extract the section for the current version from CHANGELOG.md
          # Matches from "## [VERSION]" to the next "## [" or end of file
          CHANGELOG=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && $0 ~ /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)
          # Strip leading/trailing blank lines
          CHANGELOG=$(echo "$CHANGELOG" | sed -e '/./,$!d' -e :a -e '/^\n*$/{$d;N;ba' -e '}')

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="_See the [CHANGELOG](https://github.com/S1ckn3z/ha-anilist.co/blob/main/CHANGELOG.md) for details._"
          fi

          # Write to file to avoid shell escaping issues
          {
            echo 'body<<CHANGELOG_EOF'
            echo "$CHANGELOG"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-release.outputs.tag }}
          name: ${{ needs.check-release.outputs.tag }}
          generate_release_notes: false
          files: anilist.zip
          body: |
            ${{ steps.changelog.outputs.body }}

            ---

            🔄 **After updating, restart Home Assistant** and reload your browser (Ctrl+Shift+R) to pick up card changes.
