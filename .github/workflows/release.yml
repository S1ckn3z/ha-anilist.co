name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate before release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

      - name: Run HACS validation
        uses: hacs/action@main
        with:
          category: integration
          ignore: brands

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/anilist/manifest.json'))['version'])")
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::manifest.json version ($MANIFEST_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi

      - name: Create release archive
        run: |
          cd custom_components/anilist
          zip -r ../../anilist.zip . -x "__pycache__/*" "*.pyc"
          cd ../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: anilist.zip
          body: |
            ## Installation

            ### HACS (Recommended)
            1. Add this repository as a custom repository in HACS
            2. Search for "AniList" and install
            3. Restart Home Assistant

            ### Manual
            1. Download `anilist.zip` from this release
            2. Extract to `config/custom_components/anilist/`
            3. Restart Home Assistant

            The Lovelace card is bundled and registers automatically — no manual resource setup needed.
