name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    name: Check for release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release
        id: check
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/anilist/manifest.json'))['version'])")
          TAG="v$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_VERSION="${{ github.ref_name }}"
            TAG_VERSION="${TAG_VERSION#v}"
            if [[ "$TAG_VERSION" != "$VERSION" ]]; then
              echo "::error::Tag version ($TAG_VERSION) does not match manifest version ($VERSION)"
              exit 1
            fi
            echo "Manual tag push: releasing $TAG"
            echo "should_release=true" >> $GITHUB_OUTPUT
          elif git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::notice::Tag $TAG already exists — no release needed"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "::notice::New version $VERSION detected — will release $TAG"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  validate:
    name: Validate
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

      - name: Run HACS validation
        uses: hacs/action@main
        with:
          category: integration
          ignore: brands

  release:
    name: Create GitHub Release
    needs: [check, validate]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

      - name: Verify bundle is up to date
        run: git diff --exit-code -- custom_components/anilist/www/anilist-card.js www/anilist-card/anilist-card.js

      - name: Create tag if missing
        run: |
          TAG="${{ needs.check.outputs.tag }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "::notice::Created and pushed tag $TAG"
          else
            echo "::notice::Tag $TAG already exists locally"
          fi

      - name: Create release archive
        run: |
          cd custom_components/anilist
          zip -r ../../anilist.zip . -x "__pycache__/*" "*.pyc"
          cd ../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.tag }}
          name: ${{ needs.check.outputs.tag }}
          generate_release_notes: true
          files: anilist.zip
          body: |
            ## 📦 Installation

            ### 🚀 HACS (Recommended)

            [![Open in HACS](https://my.home-assistant.io/badges/hacs_repository.svg)](https://my.home-assistant.io/redirect/hacs_repository/?owner=S1ckn3z&repository=ha-anilist.co&category=integration)

            1. Click the button above, or add `https://github.com/S1ckn3z/ha-anilist.co` as a custom repository in HACS (category: Integration)
            2. Search for **AniList** and click **Download**
            3. Restart Home Assistant

            ### 📁 Manual

            1. Download `anilist.zip` from this release
            2. Extract to `config/custom_components/anilist/`
            3. Restart Home Assistant

            The Lovelace card is bundled and registers automatically — no manual resource setup needed.

            See the [CHANGELOG](https://github.com/S1ckn3z/ha-anilist.co/blob/main/CHANGELOG.md) for full details of this release.
